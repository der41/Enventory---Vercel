{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
  <h2>Edit Your Review</h2>

  <form method="POST">
    <div class="form-group">
      <label for="rating">Rating (1-5):</label>
      <input type="number" id="rating" name="rating" min="1" max="5" class="form-control w-25" value="{{ review.rating }}" required>
    </div>

    <div class="form-group mt-3">
      <label for="comment">Comment:</label>
      <textarea id="comment" name="comment" class="form-control" rows="4" required>{{ review.comment }}</textarea>
    </div>

    <div class="mt-4">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="{{ url_for('accounts.account') }}" class="btn btn-secondary ml-2">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
