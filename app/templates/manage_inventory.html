{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
  <div class="card p-4 shadow-sm">
    <h2 class="mb-4">Manage Inventory</h2>
    <p><strong>Product:</strong> {{ product.name }}</p>
    <p><strong>Available:</strong> {{ inventory.qtyavailable }}</p>
    <p><strong>In Stock:</strong> {{ inventory.qtyinstock }}</p>
    <p><strong>In Process:</strong> {{ inventory.qtyinprocess }}</p>

    <form method="POST">
      <div class="form-group mb-3">
        <label for="action"><strong>Action</strong></label>
        <select class="form-control" name="action">
          <option value="add">Add Inventory</option>
          <option value="remove">Remove Inventory</option>
        </select>
      </div>

      <div class="form-group mb-4">
        <label for="quantity"><strong>Quantity</strong></label>
        <input type="number" class="form-control" name="quantity" min="1" required>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-success px-4">Update</button>
        <a href="{{ url_for('inventory_bp.view_inventory') }}" class="btn btn-secondary px-4">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
