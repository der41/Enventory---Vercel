<!DOCTYPE html>
<html lang="en">

<head>
  <title>Eventory</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">

  <!-- Modern jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- Bootstrap 4.6 CSS and JS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Theme Styles (new addition) -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">

  <!-- Custom Styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/example.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

  <style>
    body {
      font-family: "Open Sans", sans-serif;
    }

    .main-head {
      height: 160px;
      background: #FFF;
    }

    .sidenav {
      height: 100%;
      background-color: #000;
      overflow-x: hidden;
      padding-top: 20px;
    }

    .main {
      padding: 0px 10px;
    }

    .login-main-text {
      margin-top: 20%;
      padding: 60px;
      color: #fff;
    }

    .login-main-text h2 {
      font-weight: 300;
    }

    .btn-black {
      background-color: #000 !important;
      color: #fff;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <a class="navbar-brand d-flex align-items-center" href="{{ url_for('index.index') }}">
      <img src="{{ url_for('static', filename='images/eventory_logo.png') }}" alt="Eventory Logo" height="32" class="mr-2">
    </a>

    <!-- search bar -->
    <form class="search-bar mx-auto d-flex align-items-center" action="{{ url_for('product_search.search_results') }}">
      <input type="text" name="query" class="form-control search-input" placeholder="Search products..." />
      <button type="submit" class="search-button">
        <i class="fas fa-search"></i>
      </button>
    </form>
    
    
    <div class="ml-auto d-flex align-items-center">
      {% if current_user.is_authenticated %}
        <span class="navbar-text text-white mr-3">
          Hello, {{ current_user.username }}!
        </span>

        {% if account.sellerid %}
        <div class="dropdown mr-2">
          <button class="btn btn-outline-info btn-sm dropdown-toggle" type="button" id="sellerDropdown" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
            🛍️ Seller
          </button>
          <div class="dropdown-menu" aria-labelledby="sellerDropdown">
            <a class="dropdown-item" href="{{ url_for('inventory_bp.view_inventory') }}">🛠️ Manage Inventory</a>
            <a class="dropdown-item" href="{{ url_for('orderfulfillment_bp.view_orders') }}">📦 Manage Orders</a>
            <a class="dropdown-item" href="{{ url_for('analytics.seller_insights') }}">📊 Insights</a>
          </div>
        </div>
        {% endif %}

        <a href="{{ url_for('accounts.account') }}" class="btn btn-outline-light btn-sm mr-2" title="Go to Account">
          <i class="fas fa-user"></i> Account
        </a>

        <form action="{{ url_for('accounts.logout') }}" method="POST" class="mb-0 mr-2">
          <button type="submit" class="btn btn-outline-light btn-sm">Log out</button>
        </form>

        <a href="{{ url_for('wishlist.wishlist') }}" class="btn btn-outline-warning btn-sm mr-2" title="Wishlist">
          <i class="fas fa-star"></i> Wishlist
        </a>
        <a href="{{ url_for('cart.cart') }}" class="btn btn-warning btn-sm" title="Cart">
          <i class="fas fa-shopping-cart"></i>
        </a>

      {% else %}
        <a href="{{ url_for('accounts.login') }}" class="btn btn-outline-light btn-sm mr-2">Log in</a>
      {% endif %}
    </div>
  </nav>

  <div class="container mt-4">
    {% block content %}{% endblock %}
  </div>

  <script src="{{ url_for('static', filename='js/chatbot.js') }}"></script>
</body>
</html>
