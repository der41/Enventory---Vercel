{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
  <div class="card p-4 shadow-sm">
    <h2 class="mb-4">Edit Product</h2>
    <form method="POST" enctype="multipart/form-data">
      <div class="form-group mb-3">
        <label for="name"><strong>Product Name</strong></label>
        <input type="text" class="form-control" name="name" value="{{ product.name }}" required>
      </div>

      <div class="form-group mb-3">
        <label for="description"><strong>Product Description</strong></label>
        <textarea class="form-control" name="description" rows="3" required>{{ product.description }}</textarea>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label for="category"><strong>Category</strong></label>
          <select class="form-control" name="category" required>
            {% for cat in categories %}
              <option value="{{ cat }}" {% if cat == current_category %}selected{% endif %}>{{ cat }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label for="subcategory"><strong>Sub Category</strong></label>
          <select class="form-control" name="subcategory" required>
            {% for sub in subcategories %}
              <option value="{{ sub }}" {% if sub == current_subcategory %}selected{% endif %}>{{ sub }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-group mb-3">
        <label for="price"><strong>Selling Price (USD)</strong></label>
        <input type="number" step="0.01" class="form-control" name="price" value="{{ product.price }}" required>
      </div>

      <div class="form-group mb-3">
        <label for="status"><strong>Status</strong></label>
        <select class="form-control" name="status">
          <option value="true" {% if product.status %}selected{% endif %}>Active</option>
          <option value="false" {% if not product.status %}selected{% endif %}>Inactive</option>
        </select>
      </div>

      <div class="form-group mb-4">
        <label for="image"><strong>Update Product Image (PNG)</strong></label>
        <input type="file" name="image" accept=".png" class="form-control-file">
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-success px-4">Update</button>
        <a href="{{ url_for('inventory_bp.view_inventory') }}" class="btn btn-secondary px-4">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
